<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ngordnet Explorer</title>

    <script src="jquery.min.js"></script>
    <script src="ngordnet.js"></script>

    <link rel="stylesheet" href="ngordnet.css">
</head>

<body>

<div class="card">

    <h1>Ngordnet Explorer</h1>

    <div class="inputs">

        <div>
            <label>Words</label>
            <input type="text" id="words" placeholder="enter words...">
        </div>

        <div>
            <label>Start</label>
            <input type="text" id="start" value="2000">
        </div>

        <div>
            <label>End</label>
            <input type="text" id="end" value="2020">
        </div>

        <div>
            <label>k</label>
            <input type="text" id="k">
        </div>

    </div>

    <div class="buttons">

        <button id="history">History</button>
        <button id="historytext">History (Text)</button>
        <button id="hyponyms">Hyponyms</button>
        <button id="hypohist">Hypohist</button>
        <button id="commonancestors">Common Ancestors</button>

    </div>

    <div class="output">

        <img src="blank.png" id="plot">

        <textarea id="textresult" placeholder="Results will appear here..."></textarea>

    </div>

</div>

</body>
</html>
